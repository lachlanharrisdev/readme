services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db

    # enable hot-reloading for development
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    volumes:
      - ./backend/app:/app/app

    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      SECRET_KEY: fe3e36c1d1101643e27c83bcba73be5dae2353aa0d2319fd68b44df202b92e34 # openssl rand -hex 32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30


  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - db
      - backend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

